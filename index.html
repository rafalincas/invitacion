<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación para Esperanza ❤️</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffb6c1,#ffd1dc);
    text-align:center;
    overflow:hidden;
}

.container{
    margin-top:50px;
    position:relative;
    z-index:2;
}

h1{
    color:#ff1493;
    font-size:3em;
}

h2{
    color:#d10072;
}

button{
    padding:15px 30px;
    margin:15px;
    border:none;
    border-radius:30px;
    font-size:1.2em;
    cursor:pointer;
}

#si{
    background:#ff1493;
    color:white;
}

#no{
    background:#666;
    color:white;
    position:absolute;
}

.corazon{
    position:absolute;
    color:red;
    font-size:25px;
    animation:caer linear infinite;
}

@keyframes caer{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

.gatos img{
    margin:10px;
    border-radius:15px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function(){
emailjs.init({
publicKey:"PbXYYbT7WoSVeB7ej",
});
})();
</script>

</head>

<body>

<div class="container">

<h1>😺❤️ Esperanza ❤️😺</h1>

<p>
Un comité internacional de gatitos ha tomado una decisión...
</p>

<p>
¿Aceptas salir conmigo este martes a las 4? 🌹❤️
</p>

<div class="gatos">
<img src="gato 2.gif" width="220">
<img src="gato 3.gif" width="220">
</div>

<br>

<button id="si">Sí ❤️</button> <button id="no">No 😿</button>

</div>

<script>

document.getElementById("si").onclick = function(){

emailjs.send(
"service_v4o2jhw",
"template_2bxukc8",
{
name:"Esperanza",
email:"acepto@invitacion.com"
}
);

document.body.innerHTML = `
<div style="text-align:center;padding-top:50px;">

<h1>🎉 ¡SIIII! 🎉</h1>

<h2>Gracias por aceptar, Esperanza ❤️</h2>

<img src="gato 2.gif" width="300">

<p style="font-size:24px;">
Los gatitos están celebrando 🐱💖
</p>

<p>
📧 ¡Ya le avisé a Rafael!
</p>

</div>
`;

};

const botonNo = document.getElementById("no");

botonNo.addEventListener("mouseover",()=>{

botonNo.style.left=Math.random()*80+"vw";
botonNo.style.top=Math.random()*80+"vh";

});

for(let i=0;i<40;i++){

let c=document.createElement("div");

c.className="corazon";
c.innerHTML="❤️";

c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(Math.random()*4+3)+"s";

document.body.appendChild(c);

}

</script>

</body>
</html>
